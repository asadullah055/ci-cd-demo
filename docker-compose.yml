services:
  server:
    build: ./server
    container_name: express-server
    ports:
      - "4002:4000"
    networks:
      - fullstack-net
    restart: unless-stopped
  client:
    build:
      context: ./client
      dockerfile: dockerfile
    container_name: react-client
    ports:
      - "5174:3000"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge
